<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата прошла успешно — MAGIC VOYAGE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .result-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 16px 60px;
      background: linear-gradient(135deg, var(--color-bg-dark), var(--color-secondary));
    }

    .result-card {
      background: #fff;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      max-width: 460px;
      width: 100%;
      padding: 52px 44px;
      text-align: center;
    }

    .result-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #06d6a0, #02b589);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 8px 32px rgba(6,214,160,0.35);
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .result-title {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      color: var(--color-secondary-dark);
      margin-bottom: 12px;
    }

    .result-text {
      color: var(--color-text-light);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .result-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 28px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: var(--radius-md);
      text-decoration: none;
      box-shadow: var(--shadow-glow);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(59,159,216,0.4);
    }

    .btn-secondary {
      display: inline-block;
      padding: 14px 28px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text-light);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: border-color var(--transition), color var(--transition);
    }

    .btn-secondary:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .result-contacts {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--color-border);
      font-size: 0.8rem;
      color: var(--color-text-light);
    }

    .result-contacts a {
      color: var(--color-primary);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <nav class="nav" id="navbar">
    <div class="container nav__inner">
      <a href="index.html" class="nav__logo">
        <img src="images/egypt2.jpg/logo-1.svg" alt="MAGIC VOYAGE" class="nav__logo-img">
        <div class="nav__logo-sub">Туристическое агентство</div>
      </a>
    </div>
  </nav>

  <main class="result-page">
    <div class="result-card">
      <!-- Иконка успеха -->
      <div class="result-icon" aria-hidden="true">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <h1 class="result-title">Оплата прошла!</h1>
      <p class="result-text">
        Спасибо! Ваш платёж успешно обработан.<br>
        Наш менеджер свяжется с вами в ближайшее время для подтверждения тура.
      </p>

      <div class="result-actions">
        <a href="index.html#destinations" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
          </svg>
          Смотреть направления
        </a>
        <a href="index.html" class="btn-secondary">На главную</a>
      </div>

      <div class="result-contacts">
        Вопросы? Пишите нам:
        <a href="https://t.me/Luba262">Telegram</a> или
        <a href="tel:+998946301425">+998 94 630 14 25</a>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
